name: Build and Auto-Release (Public Distribution)

on:
  push:
    branches:
      - main
    paths:
      - 'super_skripsi_manager/lib/constants/app_constants.dart'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from AppConstants
        id: get_version
        shell: pwsh
        run: |
          $content = Get-Content super_skripsi_manager/lib/constants/app_constants.dart -Raw
          if ($content -match "currentVersion = '(?<version>.*?)'") {
            $version = $Matches['version']
            echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            echo "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Enable Windows Build
        run: flutter config --enable-windows-desktop

      - name: Get Dependencies
        run: |
          cd super_skripsi_manager
          flutter pub get

      - name: Build Windows
        run: |
          cd super_skripsi_manager
          flutter build windows --release

      - name: Compile Inno Setup
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion="${{ env.VERSION }}" `
            "super_skripsi_manager\windows\installer\super_skripsi_setup.iss"

      # --- BAGIAN PENTING: RILIS KE REPO PUBLIK ---
      - name: Create Release in Public Repository
        uses: softprops/action-gh-release@v2
        with:
          repository: gandisetiawan28/Super-Skripsi-Gandi
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          body: |
            ## Super Skripsi Gandi - Official Release
            Selamat! Versi terbaru v${{ env.VERSION }} telah tersedia.
            
            **Update Utama:**
            - Peningkatan stabilitas sistem.
            - Sinkronisasi otomatis antar platform.
            
            Silakan unduh installer di bawah ini.
          draft: false
          prerelease: false
          files: |
            super_skripsi_manager/windows/installer/Output/SuperSkripsi_Setup_v${{ env.VERSION }}.exe
