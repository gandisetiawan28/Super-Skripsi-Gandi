name: Build and Auto-Release (Dual Distribution - Zero Dependency)

on:
  push:
    branches:
      - main
    paths:
      - 'super_skripsi_manager/pubspec.yaml'
      - 'super_skripsi_manager/lib/constants/app_constants.dart'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from pubspec.yaml
        id: get_version
        shell: pwsh
        run: |
          $pubspec = Get-Content super_skripsi_manager/pubspec.yaml -Raw
          if ($pubspec -match "version:\s*(?<version>[\d\.]+)") {
            $version = $Matches['version']
            echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            echo "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Enable Windows Build
        run: flutter config --enable-windows-desktop

      - name: Get Dependencies
        run: |
          cd super_skripsi_manager
          flutter pub get

      - name: Build Windows
        run: |
          cd super_skripsi_manager
          flutter build windows --release

      # --- CACHE PYTHON PORTABLE ---
      - name: Cache Portable Python
        id: cache-python
        uses: actions/cache@v4
        with:
          path: super_skripsi_rag/python_portable
          key: ${{ runner.os }}-python-portable-v2-${{ hashFiles('super_skripsi_rag/requirements.txt') }}

      - name: Setup Portable Python Environment
        if: steps.cache-python.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ragDir = "super_skripsi_rag"
          $portableDir = "$ragDir/python_portable"
          New-Item -ItemType Directory -Force -Path $portableDir

          # 1. Download Embedded Python 3.11.9
          Write-Host "Downloading Embedded Python..."
          Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip" -OutFile "python_embed.zip"
          Expand-Archive -Path "python_embed.zip" -DestinationPath $portableDir -Force

          # 2. Enable site-packages in .pth file and add parent dir to path
          $pthFile = "$portableDir/python311._pth"
          (Get-Content $pthFile) -replace "#import site", "import site" | Set-Content $pthFile
          Add-Content -Path $pthFile -Value ".."

          # 3. Download and Install PIP
          Write-Host "Installing PIP..."
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile "$portableDir/get-pip.py"
          & "$portableDir/python.exe" "$portableDir/get-pip.py" --no-warn-script-location

          # 4. Install Requirements into Portable Folder
          Write-Host "Installing AI Libraries..."
          & "$portableDir/python.exe" -m pip install -r "$ragDir/requirements.txt" --no-warn-script-location
          
          # 5. [CLEANUP] Remove unnecessary deep folders to avoid Windows MAX_PATH limit
          Write-Host "Cleaning up unnecessary deep files (Diet Mode)..."
          Get-ChildItem -Path "$portableDir/Lib/site-packages" -Include "include", "test", "tests", "__pycache__" -Recurse | Remove-Item -Recurse -Force
          Get-ChildItem -Path "$portableDir/Lib/site-packages/torch" -Include "*.h", "*.cpp" -Recurse | Remove-Item -Force
          
          # Clean up
          Remove-Item "$portableDir/get-pip.py" -Force
          Remove-Item "python_embed.zip" -Force
          Write-Host "Portable Python Environment Ready & Optimized!"

      # --- BUILD WORD ADD-IN ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: super_skripsi_addin/package-lock.json

      - name: Build Word Add-in
        run: |
          cd super_skripsi_addin
          npm install
          npm run build

      - name: Setup API Bridge Production Dependencies
        run: |
          cd super_skripsi_extension/api-bridge
          npm install --production

      # --- SETUP PORTABLE NODE.JS ---
      - name: Setup Portable Node.js
        shell: pwsh
        run: |
          $nodeDir = "node"
          New-Item -ItemType Directory -Force -Path $nodeDir
          
          Write-Host "Downloading Portable Node.js..."
          Invoke-WebRequest -Uri "https://nodejs.org/dist/v20.12.2/node-v20.12.2-win-x64.zip" -OutFile "node.zip"
          Expand-Archive -Path "node.zip" -DestinationPath "node_temp" -Force
          
          # Move files from subfolder to root of 'node'
          Move-Item -Path "node_temp\node-v20.12.2-win-x64\*" -Destination $nodeDir -Force
          
          # Clean up
          Remove-Item "node.zip" -Force
          Remove-Item "node_temp" -Recurse -Force
          Write-Host "Portable Node.js Ready!"

      - name: Compile Inno Setup
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=${{ env.VERSION }} `
            "super_skripsi_manager\windows\installer\super_skripsi_setup.iss"

      - name: List files in installer directory (Debug)
        if: always()
        run: |
          dir super_skripsi_manager\windows\installer\
          if (Test-Path super_skripsi_manager\windows\installer\Output) {
            dir super_skripsi_manager\windows\installer\Output
          }

      # --- RILIS 1: REPOSITORY PRIVAT ---
      - name: Create Release in Private Repository
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }} (Internal Archive)
          body: |
            Build otomatis (Portable Python Included - Optimized).
          fail_on_unmatched_files: true
          files: |
            super_skripsi_manager/windows/installer/Output/SuperSkripsi_Setup_v*.exe

      # --- RILIS 2: REPOSITORY PUBLIK ---
      - name: Create Release in Public Repository
        uses: softprops/action-gh-release@v2
        with:
          repository: gandisetiawan28/Super-Skripsi-Gandi
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          body: |
            ## Super Skripsi Gandi - Zero Dependency Release
            Versi ini sudah menyertakan Python Portable yang telah dioptimasi. 
            TIDAK PERLU instal apa pun lagi. Langsung jalan!
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            super_skripsi_manager/windows/installer/Output/SuperSkripsi_Setup_v*.exe

      # --- SYNC README ---
      - name: Sync README to Public Repo
        shell: pwsh
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git clone https://x-access-token:${{ secrets.PUBLIC_REPO_TOKEN }}@github.com/gandisetiawan28/Super-Skripsi-Gandi.git public_repo
          copy-item README.md public_repo/README.md -Force
          cd public_repo
          git add README.md
          git commit -m "docs: sync README from private repo (v${{ env.VERSION }})" || echo "No changes"
          git push origin main
