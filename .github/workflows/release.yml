name: Build and Auto-Release

on:
  push:
    branches:
      - main
    paths:
      - 'super_skripsi_manager/lib/constants/app_constants.dart'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from AppConstants
        id: get_version
        shell: pwsh
        run: |
          $content = Get-Content super_skripsi_manager/lib/constants/app_constants.dart -Raw
          if ($content -match "currentVersion = '(?<version>.*?)'") {
            $version = $Matches['version']
            echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            echo "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0' # Sesuaikan dengan versi Anda jika perlu

      - name: Enable Windows Build
        run: flutter config --enable-windows-desktop

      - name: Get Dependencies
        run: |
          cd super_skripsi_manager
          flutter pub get

      - name: Build Windows
        run: |
          cd super_skripsi_manager
          flutter build windows --release

      - name: Compile Inno Setup
        shell: pwsh
        run: |
          # Jalankan ISCC (Inno Setup Compiler)
          # Kita timpa MyAppVersion dengan versi dari Dart
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion="${{ env.VERSION }}" `
            "super_skripsi_manager\windows\installer\super_skripsi_setup.iss"

      - name: Check if Release Exists
        id: check_release
        shell: pwsh
        run: |
          $tag = "v${{ env.VERSION }}"
          try {
            gh release view $tag
            echo "exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } catch {
            echo "exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          body: |
            Automated Build & Release for version ${{ env.VERSION }}
            
            Changes:
            - Fully automated build and installer creation.
            - All components (Manager, Extension, Word Add-in) synchronized.
          draft: false
          prerelease: false
          files: |
            super_skripsi_manager/windows/installer/Output/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
