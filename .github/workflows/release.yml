name: Auto Release on Version Bump

on:
  push:
    branches:
      - main
    paths:
      - 'super_skripsi_manager/lib/constants/app_constants.dart'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from AppConstants
        id: get_version
        run: |
          VERSION=$(grep "currentVersion =" super_skripsi_manager/lib/constants/app_constants.dart | sed "s/.*'\(.*\)'.*/\1/")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if Release Exists
        id: check_release
        run: |
          if git rev-parse "v${{ env.VERSION }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          body: |
            Automated Release for version ${{ env.VERSION }}
            
            Changes:
            - Synchronized across Manager, Extension, and Word Add-in.
            - Version bumped in AppConstants.dart
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
