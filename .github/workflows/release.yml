name: Build and Auto-Release (Dual Distribution)

on:
  push:
    branches:
      - main
    paths:
      - 'super_skripsi_manager/lib/constants/app_constants.dart'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from AppConstants
        id: get_version
        shell: pwsh
        run: |
          $content = Get-Content super_skripsi_manager/lib/constants/app_constants.dart -Raw
          if ($content -match "currentVersion = '(?<version>.*?)'") {
            $version = $Matches['version']
            echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            echo "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Enable Windows Build
        run: flutter config --enable-windows-desktop

      - name: Get Dependencies
        run: |
          cd super_skripsi_manager
          flutter pub get

      - name: Build Windows
        run: |
          cd super_skripsi_manager
          flutter build windows --release

      - name: Download Python Installer for Bundling
        shell: pwsh
        run: |
          $url = "https://www.python.org/ftp/python/3.11.9/python-3.11.9-amd64.exe"
          $outPath = "super_skripsi_manager\windows\installer\python-3.11.9-amd64.exe"
          Invoke-WebRequest -Uri $url -OutFile $outPath
          echo "Python installer downloaded successfully."

      - name: Compile Inno Setup
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion="${{ env.VERSION }}" `
            "super_skripsi_manager\windows\installer\super_skripsi_setup.iss"

      # --- RILIS 1: REPOSITORY PRIVAT (ARSIP INTERNAL) ---
      - name: Create Release in Private Repository
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }} (Internal Archive)
          body: |
            Build otomatis untuk arsip internal.
            Installer: SuperSkripsi_Setup_v${{ env.VERSION }}.exe
          files: |
            super_skripsi_manager/windows/installer/Output/SuperSkripsi_Setup_v${{ env.VERSION }}.exe

      # --- RILIS 2: REPOSITORY PUBLIK (DISTRIBUSI USER) ---
      - name: Create Release in Public Repository
        uses: softprops/action-gh-release@v2
        with:
          repository: gandisetiawan28/Super-Skripsi-Gandi
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          body: |
            ## Super Skripsi Gandi - Official Release
            Selamat! Versi terbaru v${{ env.VERSION }} telah tersedia.
            
            **Update Utama:**
            - Peningkatan stabilitas sistem.
            - Sinkronisasi otomatis antar platform.
            - Bundling Python & AI Library otomatis.
            
            Silakan unduh installer di bawah ini.
          draft: false
          prerelease: false
          files: |
            super_skripsi_manager/windows/installer/Output/SuperSkripsi_Setup_v${{ env.VERSION }}.exe

      # --- SYNC README KE REPO PUBLIK ---
      - name: Sync README to Public Repo
        shell: pwsh
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Clone repo publik ke folder sementara
          git clone https://x-access-token:${{ secrets.PUBLIC_REPO_TOKEN }}@github.com/gandisetiawan28/Super-Skripsi-Gandi.git public_repo
          
          # Salin README dari repo privat ke repo publik
          copy-item README.md public_repo/README.md -Force
          
          # Push perubahan ke repo publik
          cd public_repo
          git add README.md
          git commit -m "docs: sync README from private repo (v${{ env.VERSION }})" || echo "No changes to README"
          git push origin main
